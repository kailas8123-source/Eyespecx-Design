kind = "web"
previewPath = "/"
title = "Eyespecx"
version = "1.0.0"
id = "artifacts/eyespecx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19701

[services.development]
run = "pnpm --filter @workspace/eyespecx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eyespecx", "run", "build" ]
publicDir = "artifacts/eyespecx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19701"
BASE_PATH = "/"
